name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Confirm tag matches AXIS version
        run: |
          version="$(sed -n 's/^const Version = \"\\(.*\\)\"$/\\1/p' internal/buildinfo/version.go)"
          tag="${GITHUB_REF_NAME#v}"
          if [ -z "${version}" ]; then
            echo "failed to read internal/buildinfo/version.go" >&2
            exit 1
          fi
          if [ "${version}" != "${tag}" ]; then
            echo "release tag ${GITHUB_REF_NAME} does not match axis version ${version}" >&2
            exit 1
          fi

      - name: Validate release candidate
        run: |
          go test ./... -count=1
          go test -race ./... -count=1
          go build ./...
          ./hack/coverage-check.sh

      - name: Publish release
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
