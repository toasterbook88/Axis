# Release pipeline for AXIS
# Triggers on semver tags (v*.*.*). Runs full test suite, then GoReleaser.
# CI (ci.yml) handles push/PR testing. This workflow handles release artifacts.
#
# Usage:
#   git tag v0.10.0
#   git push origin v0.10.0
#
# Or use the manual dispatch for dry-run testing.

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no publish)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GO_VERSION: "1.26.2"

permissions:
  contents: write  # GoReleaser needs write to create releases

jobs:
  # ──────────────────────────────────────────────
  # Gate: full test suite must pass before release
  # ──────────────────────────────────────────────
  test:
    name: Test Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0  # GoReleaser needs full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Verify go.sum
        run: go mod verify

      - name: Run tests
        run: go test ./... -count=1 -timeout 180s

      - name: Run race tests
        run: go test -race ./... -count=1 -timeout 180s

      - name: Build check
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Coverage gates
        run: ./hack/coverage-check.sh

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Repo truth guardrails
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./hack/verify-repo-truth.sh

  # ──────────────────────────────────────────────
  # Validate: tag matches version.go
  # ──────────────────────────────────────────────
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.extract.outputs.version }}
      is_prerelease: ${{ steps.extract.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Extract version from tag and source
        id: extract
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual dispatch: use version from version.go
            SOURCE_VER=$(grep 'Version =' internal/buildinfo/version.go | cut -d'"' -f2)
            echo "version=v${SOURCE_VER}" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — version from source: v${SOURCE_VER}"
            exit 0
          fi

          TAG_VER="${{ github.ref_name }}"
          SOURCE_VER=$(grep 'Version =' internal/buildinfo/version.go | cut -d'"' -f2)

          echo "Tag version:    ${TAG_VER}"
          echo "Source version: ${SOURCE_VER}"

          # Strip leading 'v' for comparison
          TAG_CLEAN="${TAG_VER#v}"

          if [[ "${TAG_CLEAN}" != "${SOURCE_VER}" ]]; then
            echo "::error::Tag ${TAG_VER} does not match internal/buildinfo/version.go (${SOURCE_VER})"
            echo "::error::Update version.go to ${TAG_CLEAN} before tagging."
            exit 1
          fi

          echo "version=${TAG_VER}" >> "$GITHUB_OUTPUT"

          # Detect prerelease (contains hyphen: v0.10.0-rc.1, v0.10.0-beta.2)
          if [[ "${TAG_VER}" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  # ──────────────────────────────────────────────
  # Security: govulncheck
  # ──────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  # ──────────────────────────────────────────────
  # Release: GoReleaser builds + publishes
  # ──────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, validate-version, security]
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Capture Go toolchain version
        id: go-env
        run: echo "goversion=$(go env GOVERSION)" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: >-
            release
            ${{ (github.event.inputs.dry_run == 'true' || github.event_name == 'workflow_dispatch') && '--snapshot --clean' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOVERSION: ${{ steps.go-env.outputs.goversion }}

      - name: Upload artifacts (dry-run only)
        if: github.event.inputs.dry_run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: axis-snapshot-binaries
          path: dist/axis_*
          retention-days: 7

  # ──────────────────────────────────────────────
  # Post-release: verify install script works
  # ──────────────────────────────────────────────
  verify-install:
    name: Verify Install
    runs-on: ${{ matrix.os }}
    needs: release
    if: github.event_name == 'push'  # only on real releases
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Test go install
        run: |
          go install github.com/toasterbook88/axis/cmd/axis@${{ github.ref_name }}
          bindir="$(go env GOBIN)"
          if [ -z "$bindir" ]; then
            bindir="$(go env GOPATH)/bin"
          fi
          "$bindir/axis" version
