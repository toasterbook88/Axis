name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26.2"

      - name: Download dependencies
        run: go mod download

      - name: Confirm tag matches AXIS version
        run: |
          version="$(awk -F'"' '/^const Version = / {print $2}' internal/buildinfo/version.go)"
          tag="${GITHUB_REF_NAME#v}"
          if [ -z "${version}" ]; then
            echo "failed to read internal/buildinfo/version.go" >&2
            exit 1
          fi
          if [ "${version}" != "${tag}" ]; then
            echo "release tag ${GITHUB_REF_NAME} does not match axis version ${version}" >&2
            exit 1
          fi

      - name: Validate release candidate
        run: |
          go test ./... -count=1
          go test -race ./... -count=1
          go build ./...
          ./hack/coverage-check.sh

      - name: Capture Go version for GoReleaser ldflags
        run: echo "GOVERSION=$(go env GOVERSION)" >> "$GITHUB_ENV"

      - name: Publish release
        uses: goreleaser/goreleaser-action@v7.0.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
