# Disabled 2026-07-10.
#
# This workflow failed at "Create PR" on every scheduled/release run for months
# (GITHUB_TOKEN cannot satisfy main branch protection). Committing live GitHub
# release timestamps also forced thrash PRs and fought verify-repo-truth.
#
# GitHub Releases are the release authority. docs/current-state.md generated
# facts track repo version + latest tag name + ahead/matches only (no
# published_at). Re-enable only with a working automation identity AND a
# design that does not dual-write mutable release metadata into main.
name: Refresh Current State

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why re-enable was attempted (should be rare)"
        required: false
        default: "manual debug only"

permissions:
  contents: read

jobs:
  refresh:
    name: Refresh current-state.md (disabled)
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Disabled
        run: |
          echo "refresh-current-state workflow is intentionally disabled."
          echo "See workflow file header for rationale."
          exit 1
