name: Resolve PR 227 conflicts

on:
  push:
    branches:
      - chore/optimize-agent-workflows

permissions:
  contents: write

jobs:
  resolve:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Merge main and resolve known conflict
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          set +e
          git merge --no-commit --no-ff origin/main
          merge_status=$?
          set -e

          if (( merge_status != 0 )); then
            mapfile -t conflicts < <(git diff --name-only --diff-filter=U)
            printf 'Conflicts: %s\n' "${conflicts[*]}"

            if (( ${#conflicts[@]} != 1 )) || [[ "${conflicts[0]}" != "internal/agent/agent_test.go" ]]; then
              echo "Unexpected conflict set; refusing automatic resolution."
              exit 1
            fi

            git checkout --theirs -- internal/agent/agent_test.go
          fi

          git rm -- .github/workflows/resolve-pr-227-conflicts.yml
          git add -A
          git commit -m "chore: merge main and resolve PR 227 conflicts"
          git push origin HEAD:chore/optimize-agent-workflows
