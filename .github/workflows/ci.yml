name: CI

# Push only on main (avoid double-running the full suite for every in-repo PR
# push). PRs use pull_request; merge queue uses merge_group.
on:
  push:
    branches: [main]
  pull_request:
  merge_group:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Lint (gofmt + go vet)
        run: make lint

      - name: Run tests
        run: go test ./... -count=1

      - name: Run race tests
        run: go test -race ./... -count=1

      - name: Build
        run: go build ./...

      - name: Coverage gates
        run: ./hack/coverage-check.sh

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Repo truth guardrails
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./hack/verify-repo-truth.sh

      - name: Doc facts guardrails
        run: ./hack/verify-doc-facts.sh

      - name: Lifecycle lint
        run: go run hack/lifecycle-check.go
